<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Next PS — Login</title>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<style>
/* CSS yang sudah di-minify dari versi sebelumnya */
:root{--gold:#f0c040;--bg-card:rgba(12,8,24,.9);--bg-input:rgba(20,14,40,.8);--border:rgba(240,192,64,.2);--text:#f0e8d8}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a0614 url("background.webp") center/cover;display:flex;justify-content:center;align-items:center;padding:20px;font-family:'Quicksand',sans-serif}
.login-container{background:var(--bg-card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:30px 24px;max-width:360px;width:95%;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.5)}
.form-control{width:100%;padding:12px;margin-bottom:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-size:14px}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,#c89520,#f0c040);border:none;border-radius:8px;font-weight:700;color:#1a0e00;cursor:pointer;font-size:14px}
.btn-register{width:100%;padding:10px;margin-top:8px;background:0 0;border:1px solid var(--border);border-radius:8px;color:var(--gold);cursor:pointer;font-size:12px}
h2{color:#fff;margin-bottom:20px;font-weight:700}
</style>
</head>
<body>
<div class="login-container">
    <h2>Next PS Login</h2>
    <form method="POST" action="/player/growid/login/validate">
        <input type="text" name="growId" class="form-control" placeholder="GrowID" required/>
        <input type="password" name="password" class="form-control" placeholder="Password" required/>
        <input type="submit" class="btn-login" value="Login"/>
    </form>
    <input type="submit" class="btn-register" formmethod="POST" formaction="/player/register" value="Create New Account"/>
</div>
</body>
</html>
