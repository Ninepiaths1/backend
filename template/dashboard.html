<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Secret PS Login Page</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        height: 100vh;

        /* ✅ GANTI LINK DI SINI */
        background: url("https://github.com/Bexxper/backend/blob/main/backgroundbackendlogin.jpg") no-repeat center center;
        background-size: cover;

        display: flex;
        justify-content: center;
        align-items: center;

        /* ✅ system font (AMAN SEMUA DEVICE) */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        top: 0;
        left: 0;
    }

    .login-container {
        position: relative;
        background: rgba(20,20,20,0.9);
        padding: 40px 30px;
        border-radius: 16px;
        width: 90%;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.7);
        z-index: 2;
    }

    .login-title {
        font-size: 28px;
        color: #f1c40f;
        margin-bottom: 25px;
        font-weight: 600;
    }

    .form-control {
        width: 100%;
        padding: 13px;
        margin-bottom: 15px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        background: #2c2c2c;
        color: #fff;
        outline: none;
    }

    .form-control::placeholder {
        color: #bbb;
    }

    .form-control:focus {
        border: 1px solid #f1c40f;
    }

    .btn-login {
        width: 100%;
        padding: 13px;
        background: #f1c40f;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        color: #121212;
        cursor: pointer;
    }

    .btn-login:active {
        transform: scale(0.97);
    }

    .btn-register {
        width: 100%;
        padding: 11px;
        margin-top: 10px;
        background: transparent;
        border: 1px solid #f1c40f;
        border-radius: 10px;
        font-size: 14px;
        color: #f1c40f;
        cursor: pointer;
    }

    .btn-register:active {
        transform: scale(0.97);
    }

    .footer-text {
        margin-top: 15px;
        font-size: 12px;
        color: #aaa;
    }
</style>
</head>

<body>

<div class="overlay"></div>

<div class="login-container">
    <div class="login-title">Secret PS</div>

    <form method="POST" action="/player/growid/login/validate">
        <input type="text" name="growId" class="form-control"
            placeholder="Your GrowID" required />
        <input type="password" name="password" class="form-control"
            placeholder="Password" required />
        <input type="submit" class="btn-login" value="LOGIN" />
    </form>

    <form method="POST" action="/player/growid/login/validate">
        <input type="hidden" name="growId" value="" />
        <input type="hidden" name="password" value="" />
        <input type="submit" class="btn-register"
            value="Register New Account" />
    </form>

    <div class="footer-text">
        © 2026 Secret PS — Private Server - Bexxper & Ninepiaths
    </div>
</div>

</body>
</html>
