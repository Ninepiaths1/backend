<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Next PS — Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
:root {
    --gold: #f0c040;
    --gold-light: #ffe07a;
    --gold-dim: rgba(240, 192, 64, 0.15);
    --gold-glow: rgba(240, 192, 64, 0.35);
    --crystal: #6ec6ff;
    --crystal-glow: rgba(110, 198, 255, 0.3);
    --bg-card: rgba(12, 8, 24, 0.82);
    --bg-input: rgba(20, 14, 40, 0.75);
    --border: rgba(240, 192, 64, 0.18);
    --text: #f0e8d8;
    --text-dim: #9a8e78;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

body {
    min-height: 100vh;
    background: url("https://raw.githubusercontent.com/Ninepiaths1/backend/refs/heads/main/backgroundnextps.png") no-repeat center center;
    background-size: cover;
    background-color: #0a0614;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Quicksand', sans-serif;
    overflow: hidden;
}

.overlay {
    position: fixed;
    inset: 0;
    background:
        radial-gradient(ellipse at 30% 20%, rgba(240, 180, 50, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(6, 4, 16, 0.25) 0%, rgba(4, 2, 12, 0.7) 55%, rgba(2, 1, 8, 0.92) 100%);
    z-index: 1;
}

.fireflies {
    position: fixed;
    inset: 0;
    z-index: 1;
    overflow: hidden;
    pointer-events: none;
}

.firefly {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: drift ease-in-out infinite;
}

.firefly.gold {
    background: var(--gold);
    box-shadow: 0 0 6px var(--gold-glow), 0 0 12px var(--gold-glow);
}

.firefly.crystal {
    background: var(--crystal);
    box-shadow: 0 0 6px var(--crystal-glow), 0 0 12px var(--crystal-glow);
}

@keyframes drift {
    0% {
        opacity: 0;
        transform: translate(0, 0) scale(0.5);
    }
    15% {
        opacity: 0.9;
    }
    50% {
        opacity: 0.4;
        transform: translate(40px, -60px) scale(1);
    }
    85% {
        opacity: 0.8;
    }
    100% {
        opacity: 0;
        transform: translate(-20px, -120px) scale(0.3);
    }
}

@keyframes cardReveal {
    from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
}

@keyframes softGlow {
    0%, 100% {
        box-shadow:
            0 0 30px rgba(240, 192, 64, 0.06),
            0 0 60px rgba(110, 198, 255, 0.03),
            inset 0 1px 0 rgba(240, 192, 64, 0.08);
    }
    50% {
        box-shadow:
            0 0 40px rgba(240, 192, 64, 0.12),
            0 0 80px rgba(110, 198, 255, 0.06),
            inset 0 1px 0 rgba(240, 192, 64, 0.12);
    }
}

@keyframes topBorder {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.6; }
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes statusBlink {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px rgba(80, 255, 120, 0.7); }
    50% { opacity: 0.35; box-shadow: 0 0 2px rgba(80, 255, 120, 0.3); }
}

.login-container {
    position: relative;
    z-index: 2;
    background: var(--bg-card);
    backdrop-filter: blur(24px) saturate(1.3);
    -webkit-backdrop-filter: blur(24px) saturate(1.3);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 34px 26px 26px;
    width: 92%;
    max-width: 370px;
    text-align: center;
    animation: cardReveal 0.65s cubic-bezier(0.22, 1, 0.36, 1), softGlow 5s ease-in-out infinite;
    overflow: hidden;
}

.login-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: -50%;
    width: 200%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--crystal), var(--gold), transparent);
    animation: topBorder 4s ease-in-out infinite;
}

.logo-section {
    margin-bottom: 22px;
    animation: fadeUp 0.5s ease 0.1s both;
}

.logo-emblem {
    width: 52px;
    height: 52px;
    margin: 0 auto 10px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

.logo-emblem svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 10px var(--gold-glow)) drop-shadow(0 0 20px rgba(110, 198, 255, 0.15));
}

.login-title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(
        90deg,
        #d4a030 0%,
        #ffe07a 20%,
        #ffffff 40%,
        #6ec6ff 50%,
        #ffffff 60%,
        #ffe07a 80%,
        #d4a030 100%
    );
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 5s linear infinite;
    text-transform: uppercase;
}

.login-subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 3px;
    font-weight: 600;
}

.server-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
    padding: 4px 14px;
    border-radius: 20px;
    background: rgba(80, 255, 120, 0.05);
    border: 1px solid rgba(80, 255, 120, 0.15);
    animation: fadeUp 0.5s ease 0.2s both;
}

.status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #50ff78;
    animation: statusBlink 2s ease-in-out infinite;
}

.status-label {
    font-size: 10px;
    color: rgba(180, 200, 170, 0.8);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
}

.form-section {
    animation: fadeUp 0.5s ease 0.3s both;
}

.input-wrap {
    position: relative;
    margin-bottom: 12px;
}

.input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    color: var(--text-dim);
    transition: color 0.3s ease;
    pointer-events: none;
}

.form-control {
    width: 100%;
    padding: 12px 14px 12px 40px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 14px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    background: var(--bg-input);
    color: var(--text);
    outline: none;
    transition: all 0.3s ease;
    letter-spacing: 0.3px;
}

.form-control::placeholder {
    color: var(--text-dim);
    font-weight: 500;
}

.form-control:focus {
    border-color: var(--gold);
    background: rgba(240, 192, 64, 0.05);
    box-shadow: 0 0 0 3px rgba(240, 192, 64, 0.08), 0 0 20px rgba(240, 192, 64, 0.06);
}

.form-control:focus ~ .input-icon {
    color: var(--gold);
}

.btn-login {
    width: 100%;
    padding: 12px;
    margin-top: 4px;
    background: linear-gradient(135deg, #c89520, #f0c040, #ffe07a);
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: #1a0e00;
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 25%, rgba(255,255,255,0.35) 50%, transparent 75%);
    transform: translateX(-100%);
    transition: transform 0.6s;
}

.btn-login:hover::before {
    transform: translateX(100%);
}

.btn-login:active {
    transform: scale(0.97);
    box-shadow: 0 0 30px var(--gold-glow);
}

.separator {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0;
    animation: fadeUp 0.5s ease 0.4s both;
}

.sep-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
}

.sep-text {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
}

.register-section {
    animation: fadeUp 0.5s ease 0.45s both;
}

.btn-register {
    width: 100%;
    padding: 11px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 12px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    color: var(--gold-light);
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
}

.btn-register:hover {
    border-color: var(--gold);
    background: var(--gold-dim);
    box-shadow: 0 0 15px rgba(240, 192, 64, 0.08);
}

.btn-register:active {
    transform: scale(0.97);
}

.footer-area {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid rgba(240, 192, 64, 0.06);
    animation: fadeUp 0.5s ease 0.55s both;
}

.footer-main {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
}

.footer-sub {
    font-size: 9px;
    color: rgba(154, 142, 120, 0.45);
    margin-top: 3px;
}

@media (max-width: 480px) {
    body {
        align-items: flex-start;
        padding-top: 8vh;
    }

    .login-container {
        padding: 28px 22px 22px;
    }

    .login-title {
        font-size: 24px;
    }
}

@media (max-height: 640px) {
    body {
        align-items: flex-start;
        padding-top: 2vh;
    }

    .login-container {
        padding: 18px 18px 16px;
    }

    .logo-section {
        margin-bottom: 14px;
    }

    .logo-emblem {
        width: 40px;
        height: 40px;
    }
}
</style>
</head>

<body>

<div class="overlay"></div>
<div class="fireflies" id="fireflies"></div>

<div class="login-container">

    <div class="logo-section">
        <div class="logo-emblem">
            <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M26 2 L48 15 L48 37 L26 50 L4 37 L4 15 Z" stroke="url(#gem1)" stroke-width="1.2" fill="none" opacity="0.35"/>
                <path d="M26 7 L44 18 L44 34 L26 45 L8 34 L8 18 Z" stroke="url(#gem2)" stroke-width="1.5" fill="rgba(240,192,64,0.04)"/>
                <path d="M26 13 L38 20 L38 32 L26 39 L14 32 L14 20 Z" stroke="url(#gem2)" stroke-width="0.8" fill="rgba(110,198,255,0.03)" opacity="0.5"/>
                <text x="26" y="31" text-anchor="middle" font-family="Cinzel, serif" font-size="16" font-weight="900" fill="url(#gem2)">N</text>
                <defs>
                    <linearGradient id="gem1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#f0c040"/>
                        <stop offset="100%" stop-color="#6ec6ff"/>
                    </linearGradient>
                    <linearGradient id="gem2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ffe07a"/>
                        <stop offset="50%" stop-color="#f0c040"/>
                        <stop offset="100%" stop-color="#6ec6ff"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <div class="login-title">Next PS</div>
        <div class="login-subtitle">Private Server</div>
    </div>

    <div class="server-badge">
        <div class="status-dot"></div>
        <span class="status-label">Server Online</span>
    </div>

    <div class="form-section">
        <form method="POST" action="/player/growid/login/validate">
            <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <input type="text" name="growId" class="form-control" placeholder="GrowID" required />
            </div>
            <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input type="password" name="password" class="form-control" placeholder="Password" required />
            </div>
            <input type="submit" class="btn-login" value="Login" />
        </form>
    </div>

    <div class="separator">
        <div class="sep-line"></div>
        <span class="sep-text">or</span>
        <div class="sep-line"></div>
    </div>

    <div class="register-section">
        <form method="POST" action="/player/growid/login/validate">
            <input type="hidden" name="growId" value="" />
            <input type="hidden" name="password" value="" />
            <input type="submit" class="btn-register" value="Create New Account" />
        </form>
    </div>

    <div class="footer-area">
        <div class="footer-main">&copy; 2026 Next Private Server</div>
        <div class="footer-sub">Ninepiaths &amp; Team</div>
    </div>

</div>

<script>
(function() {
    var c = document.getElementById('fireflies');
    var colors = ['gold', 'gold', 'gold', 'crystal'];
    for (var i = 0; i < 25; i++) {
        var f = document.createElement('div');
        f.className = 'firefly ' + colors[Math.floor(Math.random() * colors.length)];
        f.style.left = Math.random() * 100 + '%';
        f.style.top = (30 + Math.random() * 70) + '%';
        f.style.animationDuration = (5 + Math.random() * 8) + 's';
        f.style.animationDelay = (Math.random() * 6) + 's';
        var size = (2 + Math.random() * 3) + 'px';
        f.style.width = size;
        f.style.height = size;
        c.appendChild(f);
    }
})();
</script>

</body>
</html>
